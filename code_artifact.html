<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃翊珍 | 履歷表</title>
    <style>
        :root {
            --cream-bg: #fcf9f5;
            --soft-white: #ffffff;
            --deep-brown: #3d352e;
            --accent-gold: #c5a075;
            --text-grey: #5c554d;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.04);
            --border-color: #eee9e0;
        }
        body { background-color: var(--cream-bg); color: var(--deep-brown); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', "PingFang TC", "Microsoft JhengHei", serif; padding: 40px 20px 100px 20px; line-height: 1.8; margin: 0; }
        .nav-menu { position: fixed; top: 30px; right: 30px; display: flex; gap: 20px; font-family: sans-serif; font-size: 0.85rem; z-index: 1000; font-weight: 500; }
        .nav-menu a { text-decoration: none; color: var(--text-grey); transition: 0.3s; padding: 5px 10px; border-radius: 20px; }
        .nav-menu a:hover { color: var(--soft-white); background: var(--accent-gold); }
        .container { max-width: 850px; margin: 0 auto; }
        
        /* 頁首聯絡資訊 */
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 5px; color: var(--deep-brown); }
        .tagline { color: var(--text-grey); letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; }
        .contact-info { margin-bottom: 30px; font-size: 0.95rem; color: var(--text-grey); font-family: sans-serif; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        .contact-info span { display: inline-flex; align-items: center; background: var(--soft-white); padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid var(--border-color); }
        
        section { margin-bottom: 50px; }
        h2 { font-size: 1.3rem; margin-bottom: 25px; border-bottom: 2px solid var(--accent-gold); display: inline-block; padding-bottom: 4px; color: var(--deep-brown); font-weight: 700; }
        .card { background: var(--soft-white); padding: 35px; border-radius: 8px; box-shadow: var(--card-shadow); margin-bottom: 20px; border: 1px solid var(--border-color); }
        
        /* 清單與時間軸樣式 */
        .feature-list { list-style: none; margin: 10px 0; padding: 0; }
        .feature-list li { margin-bottom: 12px; padding-left: 18px; position: relative; font-size: 1rem; text-align: justify; color: var(--text-grey); }
        .feature-list li::before { content: "•"; position: absolute; left: 0; color: var(--accent-gold); font-weight: bold; font-size: 1.2rem; }
        
        .timeline-item { position: relative; padding-left: 25px; border-left: 2px solid var(--accent-gold); margin-bottom: 30px; }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-item::before { content: ""; position: absolute; left: -6px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-gold); }
        .timeline-title { font-weight: bold; color: var(--deep-brown); font-size: 1.1rem; }
        .timeline-subtitle { font-size: 0.95rem; color: var(--text-grey); margin-bottom: 10px; font-family: sans-serif; }
        
        /* 證照網格設計 */
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .cert-item { background: var(--cream-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); transition: transform 0.3s; }
        .cert-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .cert-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 4px; }
        .cert-name { font-size: 0.85rem; text-align: center; margin-top: 10px; font-family: sans-serif; font-weight: 600; color: var(--deep-brown); line-height: 1.3; }
        .cert-name span { display: block; font-size: 0.75rem; font-weight: normal; color: var(--text-grey); margin-top: 3px; }
        
        .about-text { color: var(--text-grey); font-size: 1rem; text-align: justify; line-height: 2; text-indent: 2em; margin-bottom: 15px; }

        /* ======== 編輯器專用 UI 樣式 ======== */
        .action-btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.2s; background: var(--cream-bg); color: var(--deep-brown); border: 1px solid #ccc; }
        .action-btn:hover { background: #eee; }
        .btn-primary { background: var(--accent-gold); color: white; border: none; }
        .btn-primary:hover { background: #b08d66; }
        .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #fecaca; }

        .edit-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 1rem; box-sizing: border-box; background: #fff; }
        .edit-input:focus { outline: 2px solid var(--accent-gold); border-color: transparent; }
        .edit-textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; resize: vertical; line-height: 1.6; font-size: 1rem; box-sizing: border-box; background: #fff; }
        .edit-textarea:focus { outline: 2px solid var(--accent-gold); border-color: transparent; }
        .edit-label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        .edit-block { border: 1px dashed #d1c8bc; padding: 20px; margin-bottom: 15px; background: #fcfbfa; border-radius: 8px; }

        .project-link-btn { display: inline-flex; align-items: center; background: #f0f4f8; color: #0056b3; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; text-decoration: none; font-family: sans-serif; transition: 0.2s; border: 1px solid #dce4ec; }
        .project-link-btn:hover { background: #e2eaf1; text-decoration: underline; }
        
        #admin-controls { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid var(--accent-gold); gap: 15px; }

        /* 隱藏的編輯觸發器 (右上角) */
        #secret-trigger { position: fixed; top: 0; right: 0; width: 60px; height: 60px; z-index: 10001; cursor: default; background: transparent; }
    </style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 升級 key 避免讀取到舊的資料庫緩存，確保載入新圖片！
    const dataScript = document.getElementById('resume-data');
    window.resumeData = JSON.parse(localStorage.getItem('my_resume_data_v2')) || JSON.parse(dataScript.textContent);
    window.isEditing = false;

    // --- 渲染核心引擎 ---
    window.renderApp = () => {
        const app = document.getElementById('app');
        app.innerHTML = `
            <header>
                ${renderHeader()}
            </header>
            <main>
                <section id="skills">
                    <h2>電腦技能</h2>
                    ${renderSkills()}
                </section>
                <section id="experience">
                    <h2>學歷與工作經歷</h2>
                    ${renderExperience()}
                </section>
                <section id="about">
                    <h2>個人自傳</h2>
                    ${renderAbout()}
                </section>
                <section id="certs">
                    <h2>專業證照展示</h2>
                    ${isEditing ? `<div style="background:#e8f4f8; padding:15px; border-radius:8px; margin-bottom:20px; font-size:0.95rem; color:#0056b3; border: 1px solid #b8daff;">💡 提示：若有圖片破圖，請確保輸入了正確的英文檔名路徑（例如 <code>images/electronics_full.jpg</code> 或 <code>.png</code>）。</div>` : ''}
                    ${renderCerts()}
                </section>
                <section id="works">
                    <h2>數位專案與實作</h2>
                    ${renderProjects()}
                </section>
            </main>
        `;
        renderControls();
    };

    // --- 各區塊渲染邏輯 ---
    function renderHeader() {
        if (isEditing) {
            return `
                <div class="edit-block">
                    <label class="edit-label">姓名：</label>
                    <input class="edit-input" id="edit-name" value="${resumeData.basics.name}">
                    <label class="edit-label">應徵職務/標語：</label>
                    <input class="edit-input" id="edit-job" value="${resumeData.basics.jobTitle}">
                    <label class="edit-label">地址：</label>
                    <input class="edit-input" id="edit-loc" value="${resumeData.basics.location}">
                    <label class="edit-label">電話：</label>
                    <input class="edit-input" id="edit-phone" value="${resumeData.basics.phone}">
                    <label class="edit-label">Email：</label>
                    <input class="edit-input" id="edit-email" value="${resumeData.basics.email}">
                </div>
            `;
        }
        return `
            <h1>${resumeData.basics.name}</h1>
            <p class="tagline">${resumeData.basics.jobTitle}</p>
            <div class="contact-info">
                <span>📍 ${resumeData.basics.location}</span>
                <span>📱 ${resumeData.basics.phone}</span>
                <span>✉️ ${resumeData.basics.email}</span>
            </div>
        `;
    }

    function renderSkills() {
        if (isEditing) {
            let html = `<div class="card">`;
            resumeData.skills.forEach((s, i) => {
                html += `
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <textarea class="edit-textarea edit-skill" rows="2">${s}</textarea>
                        <button class="action-btn btn-danger" onclick="removeSkill(${i})">❌</button>
                    </div>`;
            });
            html += `<button class="action-btn" onclick="addSkill()">➕ 新增一項技能</button></div>`;
            return html;
        }
        return `<div class="card"><ul class="feature-list">${resumeData.skills.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
    }

    function renderExperience() {
        if (isEditing) {
            let html = `<div class="card">`;
            resumeData.experience.forEach((exp, i) => {
                html += `
                    <div class="edit-block exp-block">
                        <label class="edit-label">經歷標題：</label>
                        <input class="edit-input" id="exp-title-${i}" value="${exp.title}">
                        <label class="edit-label">時間/公司/副標題：</label>
                        <input class="edit-input" id="exp-sub-${i}" value="${exp.subtitle}">
                        <label class="edit-label">具體工作內容：</label>
                        ${exp.bullets.map((b, j) => `
                            <div style="display:flex; gap:10px; margin-bottom:5px;">
                                <textarea class="edit-textarea edit-exp-bullet-${i}" rows="1">${b}</textarea>
                                <button class="action-btn btn-danger" onclick="removeExpBullet(${i}, ${j})">❌</button>
                            </div>
                        `).join('')}
                        <button class="action-btn" style="margin-top:5px; font-size:0.8rem;" onclick="addExpBullet(${i})">➕ 增加工作內容</button>
                        <div style="text-align:right; margin-top:10px;">
                            <button class="action-btn btn-danger" onclick="removeExp(${i})">🗑️ 刪除此項經歷</button>
                        </div>
                    </div>`;
            });
            html += `<button class="action-btn" onclick="addExp()">➕ 新增一段經歷</button></div>`;
            return html;
        }
        let html = `<div class="card">`;
        resumeData.experience.forEach(exp => {
            html += `
                <div class="timeline-item">
                    <div class="timeline-title">${exp.title}</div>
                    <div class="timeline-subtitle">${exp.subtitle}</div>
                    ${exp.bullets.length > 0 ? `<ul class="feature-list" style="margin-top:5px;">${exp.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
                </div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderAbout() {
        if (isEditing) {
            let html = `<div class="card">`;
            resumeData.about.forEach((p, i) => {
                html += `
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <textarea class="edit-textarea edit-about" rows="4">${p}</textarea>

            });
            html += `<button class="action-btn" onclick="addAbout()">➕ 新增一個段落</button></div>`;
            return html;
        }
        return `<div class="card">${resumeData.about.map(p => `<p class="about-text">${p}</p>`).join('')}</div>`;
    }

    function renderCerts() {
        if (isEditing) {
            let html = `<div class="card">`;
            resumeData.certs.forEach((c, i) => {
                html += `
                    <div class="edit-block cert-block">
                        <label class="edit-label">圖片路徑 (預設在 images/ 資料夾下)：</label>
                        <input class="edit-input" id="cert-img-${i}" value="${c.img}">
                        <label class="edit-label">證照名稱 (若要換行可輸入 &lt;br&gt;)：</label>
                        <input class="edit-input" id="cert-title-${i}" value="${c.title}">
                        <label class="edit-label">副標題/發照單位：</label>
                        <input class="edit-input" id="cert-sub-${i}" value="${c.subtitle}">
                        <div style="text-align:right;">
                            <button class="action-btn btn-danger" onclick="removeCert(${i})">🗑️ 刪除此證照</button>
                        </div>
                    </div>`;
            });
            html += `<button class="action-btn" onclick="addCert()">➕ 新增證照</button></div>`;
            return html;
        }
        return `
            <div class="card">
                <div class="img-grid">
                    ${resumeData.certs.map(c => `
                        <div class="cert-item">
                            <img src="${c.img}" alt="${c.title.replace(/<[^>]*>?/gm, '')}" onerror="this.src='https://placehold.co/400x300/f3efe9/c5a075?text=Image+Not+Found'">
                            <div class="cert-name">${c.title}<span>${c.subtitle}</span></div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }

    function renderProjects() {
        if (isEditing) {
            let html = `<div class="card">`;
            resumeData.projects.forEach((proj, i) => {
                html += `
                    <div class="edit-block proj-block">
                        <label class="edit-label">專案標題：</label>
                        <input class="edit-input" id="proj-title-${i}" value="${proj.title}">
                        <label class="edit-label">副標題/使用技術：</label>
                        <input class="edit-input" id="proj-sub-${i}" value="${proj.subtitle}">
                        <label class="edit-label">🌐 網頁/專案連結 (選填)：</label>
                        <input type="url" class="edit-input" id="proj-link-${i}" placeholder="https://..." value="${proj.link || ''}">
                        <label class="edit-label">專案描述：</label>
                        ${proj.bullets.map((b, j) => `
                            <div style="display:flex; gap:10px; margin-bottom:5px;">
                                <textarea class="edit-textarea edit-proj-bullet-${i}" rows="2">${b}</textarea>
                                <button class="action-btn btn-danger" onclick="removeProjBullet(${i}, ${j})">❌</button>
                            </div>
                        `).join('')}
                        <button class="action-btn" style="margin-top:5px; font-size:0.8rem;" onclick="addProjBullet(${i})">➕ 增加專案描述</button>
                        <div style="text-align:right; margin-top:10px;">
                            <button class="action-btn btn-danger" onclick="removeProject(${i})">🗑️ 刪除此專案</button>
                        </div>
                    </div>`;
            });
            html += `<button class="action-btn" onclick="addProject()">➕ 新增專案</button></div>`;
            return html;
        }
        return resumeData.projects.map(proj => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 5px; flex-wrap: wrap; gap:10px;">
                    <span class="timeline-title" style="display:block;">${proj.title}</span>
                    ${proj.link ? `<a href="${proj.link}" target="_blank" class="project-link-btn">🌐 查看作品網頁</a>` : ''}
                </div>
                <span class="timeline-subtitle" style="display:block; margin-bottom: 10px;">${proj.subtitle}</span>
                <ul class="feature-list">
                    ${proj.bullets.map(b => `<li>${b}</li>`).join('')}
                </ul>
            </div>
        `).join('');
    }

    function renderControls() {
        const ctrl = document.getElementById('admin-controls');
        if (isEditing) {
            ctrl.style.display = 'flex';
            ctrl.innerHTML = `
                <button class="action-btn btn-primary" onclick="saveData()">💾 儲存修改內容</button>
                <button class="action-btn" onclick="cancelEdit()">✖ 取消</button>
            `;
        } else {
            ctrl.style.display = 'none';
            ctrl.innerHTML = '';
        }
    }

    // --- 資料操作與狀態管理 ---
    window.startEdit = () => { window.isEditing = true; renderApp(); };
    window.cancelEdit = () => { 
        window.resumeData = JSON.parse(localStorage.getItem('my_resume_data_v2')) || JSON.parse(document.getElementById('resume-data').textContent);
        window.isEditing = false; renderApp(); 
    };
    
    window.saveData = () => {
        saveStateFromDOM();
        localStorage.setItem('my_resume_data_v2', JSON.stringify(window.resumeData));
        window.isEditing = false;
        renderApp();
        alert('✅ 儲存成功！\n修改內容已保存在您當前瀏覽器的紀錄中。');
    };

    function saveStateFromDOM() {
        if (!isEditing) return;
        resumeData.basics = {
            name: document.getElementById('edit-name').value,
            jobTitle: document.getElementById('edit-job').value,
            location: document.getElementById('edit-loc').value,
            phone: document.getElementById('edit-phone').value,
            email: document.getElementById('edit-email').value
        };
        resumeData.skills = Array.from(document.querySelectorAll('.edit-skill')).map(el => el.value).filter(v => v.trim() !== "");
        
        resumeData.experience = Array.from(document.querySelectorAll('.exp-block')).map((_, i) => ({
            title: document.getElementById(`exp-title-${i}`).value,
            subtitle: document.getElementById(`exp-sub-${i}`).value,
            bullets: Array.from(document.querySelectorAll(`.edit-exp-bullet-${i}`)).map(el => el.value).filter(v => v.trim() !== "")
        }));
        
        resumeData.about = Array.from(document.querySelectorAll('.edit-about')).map(el => el.value).filter(v => v.trim() !== "");
        
        resumeData.certs = Array.from(document.querySelectorAll('.cert-block')).map((_, i) => ({
            img: document.getElementById(`cert-img-${i}`).value,
            title: document.getElementById(`cert-title-${i}`).value,
            subtitle: document.getElementById(`cert-sub-${i}`).value
        }));
        
        resumeData.projects = Array.from(document.querySelectorAll('.proj-block')).map((_, i) => ({
            title: document.getElementById(`proj-title-${i}`).value,
            subtitle: document.getElementById(`proj-sub-${i}`).value,
            link: document.getElementById(`proj-link-${i}`).value,
            bullets: Array.from(document.querySelectorAll(`.edit-proj-bullet-${i}`)).map(el => el.value).filter(v => v.trim() !== "")
        }));
    }

    // 各區塊的增刪按鈕 (觸發前會先保存當前輸入的狀態，避免資料遺失)
    window.addSkill = () => { saveStateFromDOM(); resumeData.skills.push(""); renderApp(); };
    window.removeSkill = (i) => { saveStateFromDOM(); resumeData.skills.splice(i, 1); renderApp(); };
    
    window.addExp = () => { saveStateFromDOM(); resumeData.experience.push({title:"", subtitle:"", bullets:[]}); renderApp(); };
    window.removeExp = (i) => { if(confirm("確定刪除此經歷？")) { saveStateFromDOM(); resumeData.experience.splice(i, 1); renderApp(); } };
    window.addExpBullet = (i) => { saveStateFromDOM(); resumeData.experience[i].bullets.push(""); renderApp(); };
    window.removeExpBullet = (i, j) => { saveStateFromDOM(); resumeData.experience[i].bullets.splice(j, 1); renderApp(); };

    window.addAbout = () => { saveStateFromDOM(); resumeData.about.push(""); renderApp(); };
    window.removeAbout = (i) => { saveStateFromDOM(); resumeData.about.splice(i, 1); renderApp(); };

    window.addCert = () => { saveStateFromDOM(); resumeData.certs.push({img:"", title:"新證照", subtitle:""}); renderApp(); };
    window.removeCert = (i) => { if(confirm("確定刪除此證照？")) { saveStateFromDOM(); resumeData.certs.splice(i, 1); renderApp(); } };

    window.addProject = () => { saveStateFromDOM(); resumeData.projects.push({title:"新專案", subtitle:"", link:"", bullets:[]}); renderApp(); };
    window.removeProject = (i) => { if(confirm("確定刪除此專案？")) { saveStateFromDOM(); resumeData.projects.splice(i, 1); renderApp(); } };
    window.addProjBullet = (i) => { saveStateFromDOM(); resumeData.projects[i].bullets.push(""); renderApp(); };
    window.removeProjBullet = (i, j) => { saveStateFromDOM(); resumeData.projects[i].bullets.splice(j, 1); renderApp(); };

    // 初始化渲染
    renderApp();
});
</script>

</body>
</html>
